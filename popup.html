<!DOCTYPE html>
<html lang = "en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" type="text/css" href="popup.css">
</head>
<body>
    <div class="header">
      <image src="images/icon.png" width="40px"></image>
      <h3>AutoHub</h3>
    </div>
    <br>

    <div class="switch-containers">
      <!-- Enable AutoHub -->
      <div class="switch-container">
          <label class="switch">
            <input type="checkbox" id="toggle-enable">
            <span class="slider round"></span>
          </label>
          <label for="toggle-enable">Enable AutoHub</label>
      </div>

      <!-- Enable Auto Login -->
      <div class="switch-container">
          <label class="switch">
            <input type="checkbox" id="toggle-login">
            <span class="slider round"></span>
          </label>
          <label for="toggle-login">Auto Login</label>
      </div>

      <!-- Enable Redirect -->
      <div class="switch-container">
          <label class="switch">
            <input type="checkbox" id="toggle-redirect">
            <span class="slider round"></span>
          </label>
          <label for="toggle-redirect">Redirect to Enlistment</label>
      </div>

    </div>

    <script src="scripts/script.js"></script>
</body>
</html>
